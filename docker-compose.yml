version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:latest
    container_name: partnerhub-postgres
    environment:
      POSTGRES_DB: partnerhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - partnerhub-network

  # NestJS 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: partnerhub-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/partnerhub"
      PORT: 3001
      FRONTEND_URL: "http://localhost:3000"
      JWT_SECRET: "your-secret-key-change-in-production"
      JWT_EXPIRATION: "24h"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    networks:
      - partnerhub-network
    command: npm run start:dev

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: partnerhub-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - partnerhub-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  partnerhub-network:
    driver: bridge
